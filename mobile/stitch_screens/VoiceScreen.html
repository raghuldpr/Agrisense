<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .waveform-bar {
            background-color: white;
            width: 3px;
            border-radius: 1px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary font-body text-white m-0 p-0 overflow-hidden">
<!-- Main Container: Voice Playback Overlay -->
<div class="relative min-h-screen w-full flex flex-col items-center justify-between py-12 px-8 bg-gradient-to-br from-[#1B4332] via-[#24543F] to-[#2D6A4F]">
<!-- Header Shell -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-2">
<span class="text-white font-headline font-black text-xl tracking-tight">AgriSense</span>
</div>
<button class="w-12 h-12 flex items-center justify-center bg-white/10 rounded-full hover:bg-white/20 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-white" data-icon="close">close</span>
</button>
</header>
<!-- Top Content Section -->
<div class="mt-16 flex flex-col items-center text-center w-full">
<!-- Pulsing Animation -->
<div class="relative w-48 h-48 flex items-center justify-center mb-12">
<!-- Outermost Ring -->
<div class="absolute w-full h-full rounded-full border border-white/10 opacity-30"></div>
<!-- Middle Ring -->
<div class="absolute w-4/5 h-4/5 rounded-full border border-white/20 opacity-50"></div>
<!-- Inner Ring -->
<div class="absolute w-3/5 h-3/5 rounded-full border border-white/40 opacity-70"></div>
<!-- Core Icon -->
<div class="relative z-10 w-24 h-24 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md">
<span class="material-symbols-outlined text-white text-5xl" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
</div>
<div class="space-y-2">
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-white/60">AI Agronomist</span>
<h1 class="font-headline font-bold text-3xl tracking-tight">Playing Diagnosis</h1>
<p class="font-body text-lg text-white/70">Early Blight — Tomato</p>
</div>
<div class="mt-4">
<span class="px-4 py-1.5 bg-white/10 backdrop-blur-sm rounded-full text-xs font-semibold tracking-wide border border-white/5">
                    English
                </span>
</div>
</div>
<!-- Center: Waveform Visualization -->
<div class="w-full flex items-center justify-center gap-1 h-24 my-8">
<div class="waveform-bar h-8"></div>
<div class="waveform-bar h-12"></div>
<div class="waveform-bar h-20"></div>
<div class="waveform-bar h-10"></div>
<div class="waveform-bar h-16"></div>
<div class="waveform-bar h-24"></div>
<div class="waveform-bar h-14"></div>
<div class="waveform-bar h-18"></div>
<div class="waveform-bar h-10"></div>
<div class="waveform-bar h-22"></div>
<div class="waveform-bar h-12"></div>
<div class="waveform-bar h-16"></div>
<div class="waveform-bar h-8"></div>
<div class="waveform-bar h-14"></div>
<div class="waveform-bar h-20"></div>
<div class="waveform-bar h-10"></div>
<div class="waveform-bar h-24"></div>
<div class="waveform-bar h-14"></div>
<div class="waveform-bar h-8"></div>
<div class="waveform-bar h-18"></div>
<div class="waveform-bar h-10"></div>
</div>
<!-- Bottom Controls Section -->
<div class="w-full space-y-10">
<!-- Progress Bar -->
<div class="w-full space-y-2">
<div class="relative h-1.5 w-full bg-white/20 rounded-full overflow-hidden">
<div class="absolute left-0 top-0 h-full w-[45%] bg-primary-fixed-dim rounded-full"></div>
</div>
<div class="flex justify-between font-label text-[10px] text-white/50 tracking-wider">
<span>0:45</span>
<span>2:30</span>
</div>
</div>
<!-- Playback Controls -->
<div class="flex items-center justify-center gap-12">
<button class="text-white/80 hover:text-white transition-colors">
<span class="material-symbols-outlined text-4xl" data-icon="replay_10">replay_10</span>
</button>
<button class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-primary shadow-2xl active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-5xl" data-icon="pause" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-white/80 hover:text-white transition-colors">
<span class="material-symbols-outlined text-4xl" data-icon="forward_10">forward_10</span>
</button>
</div>
<!-- Speed & Language Selectors -->
<div class="flex flex-col items-center gap-6">
<!-- Speed Selector -->
<div class="flex items-center gap-4">
<span class="font-label text-xs uppercase tracking-widest text-white/40">Speed</span>
<div class="flex bg-white/5 p-1 rounded-full border border-white/5">
<button class="px-5 py-1.5 rounded-full text-xs font-semibold text-white/60 hover:text-white transition-colors">0.75x</button>
<button class="px-5 py-1.5 rounded-full text-xs font-semibold bg-white/10 text-white shadow-sm transition-all">1x</button>
<button class="px-5 py-1.5 rounded-full text-xs font-semibold text-white/60 hover:text-white transition-colors">1.5x</button>
</div>
</div>
<!-- Language Switcher -->
<div class="flex items-center gap-3">
<span class="font-body text-sm text-white/50">Switch Language:</span>
<div class="flex gap-2">
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 border border-white/10 text-[10px] font-bold">EN</button>
<button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/5 text-[10px] font-bold text-white/60 transition-colors">हि</button>
<button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/5 text-[10px] font-bold text-white/60 transition-colors">த</button>
</div>
</div>
</div>
</div>
</div>
<!-- Background Decoration Leaf (Abstract Bleed) -->
<div class="fixed -bottom-20 -right-20 w-80 h-80 opacity-10 pointer-events-none rotate-45">
<img alt="" class="w-full h-full object-cover rounded-full" data-alt="Macro texture of a tomato leaf showing detailed organic veins and green texture on a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCQNb_f2wwwMPOUv1IBWMElkI02-zxg5OTeVg_v5rBtWQBZCgrFFmkYcppZ22Y9kiJN_4lZf89JV6iaZPx0ol1_ftJfRA-KVHOZpm7S80HVCgngTwHLWMTRRMZDpuwKpL18nEjAJ0iJ0CqpFO03nKgqCkeaI1aDahnStvexxSIGmi4GtRV1OTvFh3qwufJ8OLmBLApKampmk5o4qjb8mk0PN3M40wO0FI5l8kTPTaEaXVlxjBEGS3mgpmPYCZT-I-viQxlAQ4S0C-sB"/>
